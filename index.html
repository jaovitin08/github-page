<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>João Vitor Fernandes Cunha | Portfólio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h1 {
            color: #f0f6fc;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #8b949e;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-linkedin {
            display: inline-block;
            background-color: #0a66c2;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-linkedin:hover {
            background-color: #004182;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>João Vitor Fernandes Cunha</h1>
        <p>Desenvolvedor em formação no Bootcamp. Conecte-se comigo para acompanhar meus projetos e evolução profissional!</p>
        <a href="https://www.linkedin.com/in/jo%C3%A3o-vitor-fernandes-cunha-2abb0a265/" target="_blank" class="btn-linkedin">
            Ver meu LinkedIn
        </a>
    </div>

</body>
</html>
